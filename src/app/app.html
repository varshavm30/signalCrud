<mat-sidenav-container fullscreen>
  <mat-sidenav #sidenav>
    <mat-list (click)="sidenav.close()">
      <mat-list-item routerLink="posts">Posts</mat-list-item>
       <mat-list-item routerLink="posts/add">Add Post</mat-list-item>
        <mat-list-item>Log Out</mat-list-item>
    </mat-list>
  </mat-sidenav>

<mat-toolbar  (click)=" sidenav.open()">
     <button mat-mini-fab>
        <mat-icon>menu</mat-icon>
     </button>
  </mat-toolbar>

  <div class="container mt-5">
    <div class="row">
      <div class="col-12">
        <router-outlet> </router-outlet>
      </div>
    </div>
  </div>
</mat-sidenav-container>
