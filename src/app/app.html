<mat-sidenav-container fullscreen>
  <mat-sidenav #sideNav>
    <mat-list (click)="sideNav.close()">
      <mat-list-item routerLink="posts">Posts</mat-list-item>
       <mat-list-item routerLink="posts/add">Add Post</mat-list-item>
        <mat-list-item>Log Out</mat-list-item>
    </mat-list>
  </mat-sidenav>

  <mat-toolbar>
     <button matMiniFab (click)="sideNav.open()">
       <mat-icon>menu</mat-icon>
     </button>
  </mat-toolbar>

  <div class="container">
    <div class="row">
      <div class="col-12">
        <router-outlet> </router-outlet>
      </div>
    </div>
  </div>
</mat-sidenav-container>
