<mat-card class="h-100">
    <mat-card-header> 
        <mat-card-title>
            {{postObj.title}}
        </mat-card-title>
    </mat-card-header>
    <mat-card-content>
        <p class="m-0">
            {{postObj.content}}
        </p>
    </mat-card-content>

    </mat-card-actions>
</mat-card>
